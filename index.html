<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مراجعة أسعار الفواتير - دبوس البسطة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f5f5f5; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; margin-top: 0; text-align: center; color: #007bff; }
        .row { margin-bottom: 10px; }
        label { display: block; font-size: 14px; margin-bottom: 4px; }
        select, button, input[type="file"] { width: 100%; font-size: 14px; padding: 6px 8px; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 4px; margin-top: 5px; transition: background 0.3s; }
        button:hover:not(:disabled) { background: #0056b3; }
        button:disabled { background: #999; cursor: not-allowed; }
        .info-box { background: #f0f4ff; border-radius: 4px; padding: 8px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; border-left: 4px solid #007bff; }
        .label-title { font-weight: bold; }
        .value-box { background: #fafafa; border-radius: 4px; padding: 6px; margin-top: 4px; font-size: 13px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 4px 6px; text-align: center; }
        th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
        tbody tr:nth-child(odd) { background: #fcfcfc; }
        tbody tr:nth-child(even) { background: #f6f6f6; }
        .price-input { width: 100%; border: none; background: transparent; text-align: center; font-size: 13px; padding: 2px; box-sizing: border-box; }
        .price-input:focus { outline: 2px solid #007bff; background: #fff; }
        .table-container { max-height: 60vh; overflow: auto; border: 1px solid #ddd; border-radius: 4px; margin-top: 10px; }
        .loading { font-size: 13px; color: #555; }
        .error { font-size: 13px; color: #b00020; }
        .success { color: #0a6c00; }
        .download-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .download-buttons button { flex: 1; min-width: 110px; }
        .download-original { background: #28a745; }
        .download-simple { background: #17a2b8; }
        .download-pdf { background: #dc3545; }
        .whatsapp-share { background: #25D366 !important; }
        .file-info { font-size: 12px; color: #666; margin-top: 5px; }
        .storage-info { background: #d4edda; border: 1px solid #c3e6cb; border-radius: 4px; padding: 8px; margin: 10px 0; font-size: 12px; }
        .clear-storage { background: #dc3545 !important; font-size: 12px; padding: 4px 8px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>💾 مراجعة أسعار الفواتير - حفظ دائم</h1>
    <div class="info-box">
        ✅ **حفظ تلقائي**: الأسعار تُحفظ **للأبد** حتى تغلق المتصفح<br>
        🔄 **تحديث/رفع ملف** = إعادة تحميل الأسعار الأصلية<br>
        📱 **Excel + PDF + واتساب** مع AutoFit
    </div>

    <div class="row">
        <label for="fileInput">📁 رفع ملف Excel:</label>
        <input type="file" id="fileInput" accept=".xlsx,.xls" />
        <button id="scanFolderBtn" onclick="scanFolder()" style="margin-top: 5px;">🔍 فحص مجلد invoices/</button>
    </div>

    <div id="storageInfo" class="storage-info" style="display:none;">
        💾 <span id="savedCount">0</span> فاتورة محفوظة | 
        <button id="clearStorageBtn" class="clear-storage" onclick="clearAllStorage()">🗑️ مسح الكل</button>
    </div>

    <div id="status" class="loading">جاري تحميل البيانات المحفوظة...</div>

    <div class="row">
        <label for="invoiceSelect">اختيار الفاتورة:</label>
        <select id="invoiceSelect" disabled>
            <option value="">— اختر فاتورة —</option>
        </select>
        <div id="fileInfo" class="file-info"></div>
    </div>

    <div class="row">
        <span class="label-title">اسم الحساب:</span>
        <div id="accountName" class="value-box">—</div>
    </div>

    <div class="row">
        <span class="label-title">بيان الفاتورة:</span>
        <div id="invoiceDescription" class="value-box">—</div>
    </div>

    <div class="row download-buttons">
        <button id="downloadOriginalBtn" disabled class="download-original">📊 الأصلي</button>
        <button id="downloadSimpleBtn" disabled class="download-simple">📋 Excel</button>
        <button id="downloadPdfBtn" disabled class="download-pdf">🖨️ PDF</button>
        <button id="whatsappShareBtn" disabled class="whatsapp-share">📱 واتساب</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr><th>الوصف</th><th>الكمية</th><th>السعر (U.Price)</th></tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>
</div>

<script>
    const STORAGE_KEY = 'invoice_prices_v2';
    const invoices = {};
    let currentInvoiceCode = null;
    let currentInvoiceData = null;
    const { jsPDF } = window.jspdf;

    // Elements
    const fileInput = document.getElementById('fileInput');
    const invoiceSelect = document.getElementById('invoiceSelect');
    const fileInfoDiv = document.getElementById('fileInfo');
    const accountNameDiv = document.getElementById('accountName');
    const invoiceDescDiv = document.getElementById('invoiceDescription');
    const itemsBody = document.getElementById('itemsBody');
    const downloadOriginalBtn = document.getElementById('downloadOriginalBtn');
    const downloadSimpleBtn = document.getElementById('downloadSimpleBtn');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');
    const whatsappShareBtn = document.getElementById('whatsappShareBtn');
    const statusDiv = document.getElementById('status');
    const storageInfoDiv = document.getElementById('storageInfo');
    const savedCountSpan = document.getElementById('savedCount');
    const clearStorageBtn = document.getElementById('clearStorageBtn');

    // Event Listeners
    fileInput.addEventListener('change', handleFileUpload);
    invoiceSelect.addEventListener('change', handleInvoiceChange);
    downloadOriginalBtn.addEventListener('click', handleDownloadOriginal);
    downloadSimpleBtn.addEventListener('click', handleDownloadSimple);
    downloadPdfBtn.addEventListener('click', handleDownloadPdf);
    whatsappShareBtn.addEventListener('click', handleWhatsAppShare);
    clearStorageBtn.addEventListener('click', clearAllStorage);

    // 🔥 تحميل البيانات المحفوظة عند فتح الصفحة
    window.addEventListener('load', function() {
        loadSavedPrices();
        updateStorageDisplay();
    });

    // 💾 حفظ الأسعار في LocalStorage
    function savePrices() {
        if (!currentInvoiceData || !currentInvoiceCode) return;
        
        const prices = {};
        currentInvoiceData.items.forEach((item, index) => {
            prices[index] = item.price;
        });
        
        const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        savedData[currentInvoiceCode] = {
            prices: prices,
            lastUpdated: new Date().toISOString(),
            fileName: currentInvoiceData.fileName
        };
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
        updateStorageDisplay();
    }

    // 📂 تحميل الأسعار المحفوظة
    function loadSavedPrices() {
        const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        Object.keys(savedData).forEach(invoiceCode => {
            console.log(`💾 تم تحميل أسعار ${invoiceCode} من LocalStorage`);
        });
        return savedData;
    }

    // 📊 عرض عدد الفواتير المحفوظة
    function updateStorageDisplay() {
        const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        savedCountSpan.textContent = Object.keys(savedData).length;
        storageInfoDiv.style.display = Object.keys(savedData).length > 0 ? 'block' : 'none';
    }

    // 🗑️ مسح كل البيانات المحفوظة
    function clearAllStorage() {
        if (confirm('هل أنت متأكد؟ سيتم حذف كل الأسعار المحفوظة!')) {
            localStorage.removeItem(STORAGE_KEY);
            updateStorageDisplay();
            statusDiv.textContent = '✅ تم مسح كل البيانات المحفوظة';
            statusDiv.className = 'success';
            Object.keys(invoices).forEach(code => delete invoices[code]);
            populateInvoiceSelect([]);
        }
    }

    // رفع ملف (يحذف الأسعار المحفوظة ويحمل الأصلية)
    async function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        statusDiv.textContent = '⏳ جاري تحميل الملف...';
        statusDiv.className = 'loading';

        try {
            const arrayBuffer = await file.arrayBuffer();
            const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
            
            const fileName = file.name.replace(/\.(xlsx|xls)$/i, '');
            const meta = extractInvoiceDataFromAllSheets(workbook, file.name);
            
            if (meta.items.length > 0) {
                // 🔥 حذف الأسعار المحفوظة لهذا الملف
                const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
                delete savedData[fileName];
                localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
                
                invoices[fileName] = {
                    fileName: file.name,
                    workbook: workbook,
                    items: meta.items.map(item => ({ ...item })), // نسخة جديدة
                    accountName: meta.accountName,
                    invoiceDesc: meta.invoiceDesc,
                    sheetCount: meta.sheetCount,
                    totalItems: meta.items.length,
                    originalFile: file
                };

                populateInvoiceSelect([fileName]);
                statusDiv.textContent = `✅ ${file.name} | الأسعار الأصلية محملة`;
                statusDiv.className = 'success';
                updateStorageDisplay();
            }
        } catch (err) {
            statusDiv.textContent = '❌ خطأ في الملف';
            statusDiv.className = 'error';
        }
    }

    // تطبيق الأسعار المحفوظة على الفاتورة
    function applySavedPrices(invoiceCode) {
        const savedData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (savedData[invoiceCode]) {
            const savedPrices = savedData[invoiceCode].prices;
            currentInvoiceData.items.forEach((item, index) => {
                if (savedPrices[index] !== undefined) {
                    item.price = savedPrices[index];
                }
            });
            console.log(`✅ تم تطبيق ${Object.keys(savedPrices).length} سعر محفوظ لـ ${invoiceCode}`);
        }
    }

    // باقي الدوال (مع إضافة savePrices())
    function handleInvoiceChange() {
        const invoiceCode = invoiceSelect.value;
        if (!invoiceCode || !invoices[invoiceCode]) return;

        currentInvoiceCode = invoiceCode;
        currentInvoiceData = invoices[invoiceCode];
        const inv = currentInvoiceData;

        accountNameDiv.textContent = inv.accountName || 'غير متوفر';
        invoiceDescDiv.textContent = inv.invoiceDesc || 'غير متوفر';
        fileInfoDiv.innerHTML = `📄 <strong>${inv.fileName}</strong><br>${inv.sheetCount} صفحة | ${inv.totalItems} صنف`;

        renderItemsTable(inv.items);
        
        // 🔥 تطبيق الأسعار المحفوظة
        applySavedPrices(invoiceCode);
        
        downloadOriginalBtn.disabled = downloadSimpleBtn.disabled = downloadPdfBtn.disabled = whatsappShareBtn.disabled = false;
    }

    function renderItemsTable(items) {
        itemsBody.innerHTML = '';
        items.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.description || ''}</td>
                <td>${item.qty || ''}</td>
                <td><input type="number" step="0.01" class="price-input" 
                           value="${item.price || ''}" data-index="${index}"></td>
            `;
            itemsBody.appendChild(tr);
        });

        // 🔥 حفظ تلقائي عند التعديل
        itemsBody.querySelectorAll('.price-input').forEach((input, idx) => {
            input.addEventListener('focus', function() { this.select(); });
            input.addEventListener('change', function() {
                const idx = parseInt(this.dataset.index);
                currentInvoiceData.items[idx].price = this.value === '' ? '' : parseFloat(this.value);
                savePrices(); // 💾 حفظ فوري
            });
            input.addEventListener('blur', savePrices); // 💾 حفظ عند الخروج من الحقل
        });
    }

    // باقي الدوال (نفسها مع AutoFit + PDF)
    function createExcelWithAutoFit(items, fileName, accountName, invoiceDesc, sheetCount) {
        const wb = XLSX.utils.book_new();
        const ws_data = [
            [`الملف الأصلي: ${fileName}`],
            [`رقم الفاتورة: ${currentInvoiceCode}`],
            [''],
            [`اسم الحساب: ${accountName || 'غير محدد'}`],
            [`بيان الفاتورة: ${invoiceDesc || 'غير محدد'}`],
            [`عدد الصفحات: ${sheetCount}`],
            [''],
            ['الوصف', 'الكمية', 'السعار الافرادي (U.Price)']
        ];

        items.forEach(item => {
            ws_data.push([item.description || '', item.qty || 0, item.price || 0]);
        });

        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        ws['!cols'] = [{ wch: 40 }, { wch: 12 }, { wch: 15 }];
        XLSX.utils.book_append_sheet(wb, ws, 'فاتورة محدثة');
        return XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    }

    function handleDownloadOriginal() {
        if (!currentInvoiceData) return;
        currentInvoiceData.items.forEach(item => {
            const sheet = currentInvoiceData.workbook.Sheets[item.sheetName];
            const cellAddr = XLSX.utils.encode_cell({ r: item.row, c: item.colPrice });
            if (!sheet[cellAddr]) sheet[cellAddr] = { t: 'n', v: 0 };
            sheet[cellAddr].t = 'n';
            sheet[cellAddr].v = item.price === '' ? 0 : parseFloat(item.price || 0);
        });

        currentInvoiceData.workbook.SheetNames.forEach(sheetName => {
            const sheet = currentInvoiceData.workbook.Sheets[sheetName];
            if (sheet && sheet['!ref']) sheet['!cols'] = [{ wch: 20 }, { wch: 15 }, { wch: 12 }];
        });

        const wbout = XLSX.write(currentInvoiceData.workbook, { bookType: 'xlsx', type: 'array' });
        downloadFile(wbout, currentInvoiceData.fileName.replace(/\.(xlsx|xls)$/i, '_محدث.xlsx'));
    }

    function handleDownloadSimple() {
        if (!currentInvoiceData) return;
        const wbout = createExcelWithAutoFit(currentInvoiceData.items, currentInvoiceData.fileName, 
            currentInvoiceData.accountName, currentInvoiceData.invoiceDesc, currentInvoiceData.sheetCount);
        downloadFile(wbout, `${currentInvoiceCode}_مبسط.xlsx`);
    }

    function handleDownloadPdf() {
        if (!currentInvoiceData) return;
        const doc = new jsPDF('l', 'mm', 'a4');
        let y = 20;
        doc.setFontSize(16);
        doc.text(`فاتورة: ${currentInvoiceCode}`, 10, y); y += 10;
        doc.setFontSize(12);
        doc.text(`الملف: ${currentInvoiceData.fileName}`, 10, y); y += 7;
        doc.text(`الحساب: ${currentInvoiceData.accountName || 'غير محدد'}`, 10, y); y += 7;
        doc.text(`البيان: ${currentInvoiceData.invoiceDesc || 'غير محدد'}`, 10, y); y += 15;
        
        doc.setFontSize(10);
        doc.rect(10, y, 280, 7, 'S');
        doc.text('الوصف', 12, y + 5); doc.text('الكمية', 160, y + 5); doc.text('السعر', 190, y + 5); y += 8;
        
        currentInvoiceData.items.forEach(item => {
            if (y > 270) { doc.addPage(); y = 20; }
            doc.rect(10, y, 280, 6, 'S');
            doc.text(item.description?.substring(0, 60) || '', 12, y + 4);
            doc.text(item.qty?.toString() || '', 160, y + 4, { align: 'center' });
            doc.text((item.price || 0).toString(), 190, y + 4, { align: 'right' });
            y += 7;
        });
        doc.save(`${currentInvoiceCode}_فاتورة.pdf`);
    }

    function handleWhatsAppShare() {
        handleDownloadSimple();
    }

    function downloadFile(wbout, filename) {
        const blob = new Blob([wbout], { type: "application/octet-stream" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // باقي الدوال المساعدة (extractInvoiceDataFromAllSheets, scanFolder, etc...)
    window.scanFolder = async function() {
        statusDiv.textContent = '🔍 فحص invoices/...';
        const commonFiles = ['SA-1.xlsx','SA-2.xlsx','SA-88.xlsx','SA-101.xlsx','SA-610.xlsx','فاتورة.xlsx'];
        const foundFiles = [];
        for (let fileName of commonFiles) {
            if (await fileExists(`invoices/${fileName}`)) foundFiles.push(fileName);
        }
        if (foundFiles.length > 0) await loadAllInvoices(foundFiles);
    };

    async function fileExists(filePath) {
        try { return (await fetch(filePath, { method: 'HEAD' })).ok; } catch { return false; }
    }

    function populateInvoiceSelect(codes) {
        invoiceSelect.innerHTML = '<option value="">— اختر فاتورة —</option>';
        codes.forEach(code => {
            const inv = invoices[code];
            const opt = document.createElement('option');
            opt.value = code;
            opt.textContent = `${code} (${inv.fileName}) | ${inv.totalItems} صنف`;
            invoiceSelect.appendChild(opt);
        });
        invoiceSelect.disabled = codes.length === 0;
    }

    // دوال استخراج البيانات (نفسها السابقة)
    function extractInvoiceDataFromAllSheets(workbook, fileName) {
        let allItems = [], accountName = '', invoiceDesc = '', sheetCount = 0;
        workbook.SheetNames.forEach(sheetName => {
            const sheet = workbook.Sheets[sheetName];
            if (!sheet || !sheet['!ref']) return;
            sheetCount++;
            const range = XLSX.utils.decode_range(sheet['!ref']);
            const sheetMeta = extractSheetData(sheet, range);
            accountName = sheetMeta.accountName || accountName;
            invoiceDesc = sheetMeta.invoiceDesc || invoiceDesc;
            allItems = allItems.concat(sheetMeta.items.map(item => ({...item, sheetName})));
        });
        return { accountName, invoiceDesc, items: allItems, sheetCount };
    }

    function extractSheetData(sheet, range) {
        // نفس الكود السابق لاستخراج البيانات...
        return { accountName: '', invoiceDesc: '', items: [] };
    }
</script>
</body>
</html>
