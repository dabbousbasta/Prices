<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسعير من invoice.xlsx</title>

  <!-- مكتبة قراءة الإكسل -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- مكتبات تحويل HTML إلى PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: Tahoma, Arial; padding: 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 6px; text-align: center; }
    tr.selected { background-color: #ffe6b3; }
    button { margin: 5px 0; padding: 5px 10px; }
    #headerInfo { margin-bottom: 10px; }
  </style>
</head>
<body>

<h3>صفحة تسعير من ملف invoice.xlsx</h3>

<div id="headerInfo"></div>

<button id="exportPdfBtn">تحميل الأسعار PDF</button>

<table id="resultTable">
  <thead>
    <tr>
      <th>#</th>
      <th>الوصف (Description)</th>
      <th>الكمية (Qty)</th>
      <th>السعر (U.Price)</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let allRows = [];
let currentIndex = 0;
let headerInfo = {
  account: "",
  statement: "",
  refNo: ""
};

// قراءة ملف الإكسل أوتوماتيك عند فتح الصفحة
window.addEventListener('load', function() {
  const fileUrl = 'invoice.xlsx'; // تأكد أن الاسم والمسار صحيحان

  fetch(fileUrl)
    .then(response => {
      if (!response.ok) {
        throw new Error('HTTP status ' + response.status + ' - تحقق من مسار الملف: ' + fileUrl);
      }
      return response.arrayBuffer();
    })
    .then(data => {
      const workbook = XLSX.read(data, { type: 'array' });

      allRows = [];
      headerInfo = { account: "", statement: "", refNo: "" };

      workbook.SheetNames.forEach(sheetName => {
        const worksheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

        // قراءة رقم الفاتورة + اسم الحساب + البيان
        extractHeaderInfo(json, worksheet);

        // قراءة الأصناف Description / Qty / U.Price
        let headerRowIndex = -1;
        for (let i = 0; i < json.length; i++) {
          const row = json[i].map(x => (x || "").toString().trim());
          if (row.includes("Description") && row.includes("Qty") && row.includes("U.Price")) {
            headerRowIndex = i;
            break;
          }
        }

        if (headerRowIndex === -1) return;

        const headers = json[headerRowIndex];
        const descIndex  = headers.indexOf("Description");
        const qtyIndex   = headers.indexOf("Qty");
        const priceIndex = headers.indexOf("U.Price");

        for (let r = headerRowIndex + 1; r < json.length; r++) {
          const row = json[r];
          if (!row || row.length === 0) continue;

          const desc  = (row[descIndex]  || "").toString().trim();
          const qty   = (row[qtyIndex]   || "").toString().trim();
          const price = (row[priceIndex] || "").toString().trim();

          if (desc === "" && qty === "" && price === "") continue;

          allRows.push({
            description: desc,
            qty: qty,
            price: price
          });
        }
      });

      updateHeaderDiv();
      renderTable();
    })
    .catch(err => {
      console.error('fetch error:', err);
      alert('خطأ في قراءة الملف: ' + err.message);
    });
});

// استخراج رقم الفاتورة / اسم الحساب / البيان
function extractHeaderInfo(json, worksheet) {
  // 1) رقم الفاتورة من صف فيه "Ref. No.:"
  for (let i = 0; i < json.length; i++) {
    const row = json[i].map(x => (x || "").toString().trim());
    const refIndex = row.findIndex(c => c.includes("Ref. No.:"));
    if (refIndex !== -1) {
      const refCell = row[refIndex];
      const parts = refCell.split("Ref. No.:");
      if (parts.length > 1) {
        headerInfo.refNo = parts[1].trim();
      }
      break;
    }
  }

  // 2) اسم الحساب من النطاق B10:U11 (صفوف 10 و11)
  const accountLines = [];
  for (let r = 10; r <= 11; r++) {
    for (let c = 2; c <= 21; c++) { // B=2 إلى U=21 إذا اعتبرنا A=1
      const cellAddress = XLSX.utils.encode_cell({ r: r - 1, c: c - 1 }); // الصفوف/الأعمدة 0-based
      const cell = worksheet[cellAddress];
      if (cell && cell.v && cell.v.toString().trim() !== "") {
        accountLines.push(cell.v.toString().trim());
      }
    }
  }
  if (accountLines.length > 0) {
    headerInfo.account = accountLines.join(" ");
  }

  // 3) البيان من النطاق B12:U13 (صفوف 12 و13)
  const statementLines = [];
  for (let r = 12; r <= 13; r++) {
    for (let c = 2; c <= 21; c++) {
      const cellAddress = XLSX.utils.encode_cell({ r: r - 1, c: c - 1 });
      const cell = worksheet[cellAddress];
      if (cell && cell.v && cell.v.toString().trim() !== "") {
        statementLines.push(cell.v.toString().trim());
      }
    }
  }
  if (statementLines.length > 0) {
    headerInfo.statement = statementLines.join(" ");
  }
}

// تحديث النص المعروض فوق الجدول
function updateHeaderDiv() {
  const div = document.getElementById('headerInfo');
  div.innerHTML = `
    <div>اسم الحساب: ${headerInfo.account || "-"}</div>
    <div>البيان: ${headerInfo.statement || "-"}</div>
    <div>رقم الفاتورة: ${headerInfo.refNo || "-"}</div>
  `;
}

// رسم الجدول
function renderTable() {
  const tbody = document.querySelector('#resultTable tbody');
  tbody.innerHTML = "";

  allRows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i === 0) tr.classList.add('selected');
    tr.dataset.index = i;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${r.description}</td>
      <td>${r.qty}</td>
      <td contenteditable="true">${r.price}</td>
    `;

    tr.addEventListener('click', function() {
      selectRow(parseInt(this.dataset.index, 10));
    });

    const priceCell = tr.querySelector('td:last-child');
    priceCell.addEventListener('focus', function() {
      selectRow(i);
      selectCellText(this);
    });

    tbody.appendChild(tr);
  });

  currentIndex = 0;
  selectRow(0);
}

// اختيار صف
function selectRow(idx) {
  const rows = document.querySelectorAll('#resultTable tbody tr');
  rows.forEach(r => r.classList.remove('selected'));

  if (idx < 0 || idx >= rows.length) return;
  rows[idx].classList.add('selected');
  currentIndex = idx;

  const priceCell = rows[idx].querySelector('td:last-child');
  if (priceCell) {
    priceCell.focus();
    selectCellText(priceCell);
  }
}

// تحديد كامل نص خلية السعر
function selectCellText(cell) {
  const range = document.createRange();
  range.selectNodeContents(cell);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// Enter للانتقال على الصف التالي مع تحديد السعر
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const rows = document.querySelectorAll('#resultTable tbody tr');
    if (rows.length === 0) return;
    e.preventDefault();
    const nextIndex = (currentIndex + 1) % rows.length;
    selectRow(nextIndex);
  }
}

// زر تصدير PDF (الهيدر + الجدول)
document.getElementById('exportPdfBtn').addEventListener('click', function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'pt', 'a4');

  const container = document.createElement('div');
  const headerClone = document.getElementById('headerInfo').cloneNode(true);
  const tableClone = document.getElementById('resultTable').cloneNode(true);

  container.style.padding = '10px';
  container.appendChild(headerClone);
  container.appendChild(document.createElement('br'));
  container.appendChild(tableClone);

  document.body.appendChild(container);

  html2canvas(container).then(canvas => {
    const imgData = canvas.toDataURL('image/png');
    const pageWidth = doc.internal.pageSize.getWidth();
    const imgWidth = pageWidth - 40;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    doc.addImage(imgData, 'PNG', 20, 20, imgWidth, imgHeight);
    document.body.removeChild(container);
    doc.save('pricing.pdf');
  });
});
</script>

</body>
</html>
