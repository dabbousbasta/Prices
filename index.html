<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>فواتير للتسعير لدبوس البسطة</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f7f7f7; }
    fieldset { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; background: #fff; }
    select, button, input { padding: 8px 10px; margin: 5px; }
    input[type="number"] { width: 100px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: right; }
    th { background-color: #007cba; color: white; }
    .total-row td { font-weight: bold; background-color: #f0f0f0; }
    .invoice-total { background-color: #e8f4fd; padding: 15px; margin-bottom: 15px; border-radius: 5px; font-weight: bold; font-size: 18px; }
    .invoice-total span { color: #007cba; font-size: 22px; }
    #btnShare { background-color: #25D366; color: white; border: none; font-weight: bold; }
    #btnShare:hover { background-color: #128C7E; }
  </style>
</head>
<body>
  <h1>فواتير للتسعير لدبوس البسطة</h1>

  <div class="invoice-total">
    مجموع الفاتورة: <span id="invoiceTotal">0.00</span> $
  </div>

  <fieldset>
    <legend>اختر</legend>
    <label>الملف:</label>
    <select id="selectFile">
      <option value="">اختر ملف...</option>
    </select>
    <button id="btnShow">إظهار البيانات</button>
    <button id="btnShare">مشاركة PDF</button>
  </fieldset>

  <div id="tableContainer">
    <table id="dataTable">
      <thead>
        <tr>
          <th>البيان</th>
          <th>الكمية</th>
          <th>السعر $</th>
          <th>المجموع $</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot id="tableFoot">
        <tr class="total-row">
          <td colspan="3">المجموع الكلي</td>
          <td id="totalAmount">0.00</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <script>
    const FILES_LIST_URL = "invoices/files.json";
    const INVOICES_FOLDER = "invoices/";
    let currentFileName = "";

    async function loadFileList() {
      try {
        const response = await fetch(FILES_LIST_URL);
        const fileList = await response.json();
        return fileList;
      } catch (e) {
        alert("خطأ في قراءة ملف invoices/files.json:\n" + e.message);
        console.error(e);
        return [];
      }
    }

    async function loadWorkbook(fileName) {
      try {
        const encodedFileName = encodeURIComponent(fileName);
        const response = await fetch(INVOICES_FOLDER + encodedFileName);
        const data = await response.arrayBuffer();
        return XLSX.read(data, { type: "array", cellFormula: false, cellDates: true });
      } catch (e) {
        alert("خطأ في قراءة الملف " + fileName + ":\n" + e.message);
        console.error(e);
        return null;
      }
    }

    function getInvoiceData(workbook) {
      const sheetName = workbook.SheetNames[0];
      const ws = workbook.Sheets[sheetName];
      
      const data = XLSX.utils.sheet_to_json(ws, { 
        header: 1, 
        defval: "", 
        blankrows: false,
        raw: false,
        formatted: true
      });

      const rows = [];

      for (let i = 1; i < data.length; i++) {
        const row = data[i];
        
        // الأماكن الصحيحة للأعمدة:
        const itemname = row[4];   // Column E - Item_Name
        const qty = row[6];        // Column G - QTY
        const note = row[30];      // Column AE - Note
        const cost = row[33];      // Column AH - COST

        // تجاهل الصفوف الفارغة تماماً
        if (!itemname && !qty && !note && !cost) {
          continue;
        }
        
        // إذا itemname فارغ، تجاهل
        if (!itemname || String(itemname).trim() === "") {
          continue;
        }
        
        // دمج Item_Name مع Note
        let desc = String(itemname).trim();
        if (note && String(note).trim() !== "" && String(note) !== "undefined" && String(note) !== "null") {
          desc += " " + String(note).trim();
        }

        const costValue = (cost === "" || cost === null || cost === undefined) ? 0 : parseFloat(cost) || 0;
        const qtyValue = parseFloat(qty) || 0;

        rows.push({
          desc: desc,
          qty: qtyValue,
          cost: costValue
        });
      }

      return rows;
    }

    function calculateRowTotal(qty, cost) {
      return qty * cost;
    }

    function renderTable(rows) {
      const tbody = document.getElementById("tableBody");
      const totalTd = document.getElementById("totalAmount");
      const invoiceTotal = document.getElementById("invoiceTotal");

      tbody.innerHTML = "";

      if (rows.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = '<td colspan="4">لا توجد بيانات في الملف.</td>';
        tbody.appendChild(tr);
        totalTd.textContent = "0.00";
        invoiceTotal.textContent = "0.00";
        return;
      }

      let total = 0;
      rows.forEach((row, index) => {
        const rowTotal = calculateRowTotal(row.qty, row.cost);
        total += rowTotal;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.desc}</td>
          <td>${row.qty}</td>
          <td><input type="number" id="price-${index}" value="${row.cost.toFixed(2)}" step="0.01" min="0" onfocus="this.select()" oninput="updateRowTotal(${index}, ${row.qty})" /></td>
          <td id="row-total-${index}">${rowTotal.toFixed(2)}</td>
        `;
        tbody.appendChild(tr);

        const priceInput = tr.querySelector(`#price-${index}`);
        priceInput.addEventListener("keydown", function(e) {
          if (e.key === "Enter") {
            e.preventDefault();
            const nextIndex = index + 1;
            const nextInput = document.getElementById(`price-${nextIndex}`);
            if (nextInput) {
              nextInput.focus();
            }
          }
        });
      });

      totalTd.textContent = total.toFixed(2);
      invoiceTotal.textContent = total.toFixed(2);
    }

    function updateRowTotal(index, qty) {
      const priceInput = document.getElementById(`price-${index}`);
      const newCost = parseFloat(priceInput.value) || 0;
      const rowTotal = calculateRowTotal(qty, newCost);
      document.getElementById(`row-total-${index}`).textContent = rowTotal.toFixed(2);
      updateInvoiceTotal();
    }

    function updateInvoiceTotal() {
      let total = 0;
      const rowTotals = document.querySelectorAll("#tableBody tr");
      rowTotals.forEach((tr, index) => {
        const rowTotalCell = document.getElementById(`row-total-${index}`);
        if (rowTotalCell) {
          total += parseFloat(rowTotalCell.textContent) || 0;
        }
      });
      document.getElementById("totalAmount").textContent = total.toFixed(2);
      document.getElementById("invoiceTotal").textContent = total.toFixed(2);
    }

    function shareAsPDF() {
      const element = document.body;
      const pdfFileName = currentFileName.replace(/\.xlsx$/, '.pdf').replace(/\.xlsm$/, '.pdf');
      const opt = {
        margin: 10,
        filename: pdfFileName,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jshtml: false
      };
      html2pdf().set(opt).from(element).save();
    }

    async function refreshPage() {
      const fileList = await loadFileList();
      const selectFile = document.getElementById("selectFile");
      
      selectFile.innerHTML = '<option value="">اختر ملف...</option>';
      fileList.forEach(fileName => {
        const opt = document.createElement("option");
        opt.value = fileName;
        opt.textContent = fileName;
        selectFile.appendChild(opt);
      });

      document.getElementById("btnShow").onclick = () => {
        const selectedFile = selectFile.value;
        if (!selectedFile) {
          alert("الرجاء اختيار ملف!");
          return;
        }
        currentFileName = selectedFile;
        loadWorkbook(selectedFile).then(workbook => {
          if (!workbook) return;
          const rows = getInvoiceData(workbook);
          renderTable(rows);
        });
      };

      document.getElementById("btnShare").onclick = shareAsPDF;
    }

    window.addEventListener("load", refreshPage);
  </script>
</body>
</html>
