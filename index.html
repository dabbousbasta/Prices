<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسعير من invoice.xlsx</title>

  <!-- مكتبة قراءة الإكسل -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <!-- مكتبة تحويل HTML إلى PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    body { font-family: Tahoma, Arial; padding: 10px; }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 4px 6px; text-align: center; }
    tr.selected { background-color: #ffe6b3; }
    button { margin: 5px 0; padding: 5px 10px; }
  </style>
</head>
<body>

<h3>صفحة تسعير من ملف invoice.xlsx</h3>

<!-- هنا أنت تحط فوق باليد اسم الحساب / البيان / رقم الفاتورة -->
<div>
  <span>الساده معمار - سان جوزيف - SA1 - 106</span>
</div>

<button id="exportPdfBtn">تحميل جدول الأسعار PDF</button>

<table id="resultTable">
  <thead>
    <tr>
      <th>#</th>
      <th>الوصف (Description)</th>
      <th>الكمية (Qty)</th>
      <th>السعر (U.Price)</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let allRows = [];
let currentIndex = 0;

// قراءة ملف الإكسل أوتوماتيك عند فتح الصفحة
window.addEventListener('load', function() {
  fetch('invoice.xlsx')
    .then(response => {
      if (!response.ok) throw new Error('لم يتم العثور على invoice.xlsx');
      return response.arrayBuffer();
    })
    .then(data => {
      const workbook = XLSX.read(data, { type: 'array' });
      allRows = [];

      workbook.SheetNames.forEach(sheetName => {
        const worksheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

        let headerRowIndex = -1;
        for (let i = 0; i < json.length; i++) {
          const row = json[i].map(x => (x || "").toString().trim());
          if (row.includes("Description") && row.includes("Qty") && row.includes("U.Price")) {
            headerRowIndex = i;
            break;
          }
        }

        if (headerRowIndex === -1) return;

        const headers = json[headerRowIndex];
        const descIndex  = headers.indexOf("Description");
        const qtyIndex   = headers.indexOf("Qty");
        const priceIndex = headers.indexOf("U.Price");

        for (let r = headerRowIndex + 1; r < json.length; r++) {
          const row = json[r];
          if (!row || row.length === 0) continue;

          const desc  = (row[descIndex]  || "").toString().trim();
          const qty   = (row[qtyIndex]   || "").toString().trim();
          const price = (row[priceIndex] || "").toString().trim();

          if (desc === "" && qty === "" && price === "") continue;

          allRows.push({
            description: desc,
            qty: qty,
            price: price
          });
        }
      });

      renderTable();
    })
    .catch(err => {
      alert('خطأ في قراءة الملف: ' + err.message);
    });
});

// رسم الجدول
function renderTable() {
  const tbody = document.querySelector('#resultTable tbody');
  tbody.innerHTML = "";

  allRows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i === 0) tr.classList.add('selected');
    tr.dataset.index = i;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${r.description}</td>
      <td>${r.qty}</td>
      <td contenteditable="true">${r.price}</td>
    `;

    tr.addEventListener('click', function() {
      selectRow(parseInt(this.dataset.index, 10));
    });

    // لما تدخل على خلية السعر بالماوس أو اللمس، يتحدد النص كامل
    const priceCell = tr.querySelector('td:last-child');
    priceCell.addEventListener('focus', function() {
      selectRow(i);
      selectCellText(this);
    });

    tbody.appendChild(tr);
  });

  currentIndex = 0;
  // بعد ما نرسم، نختار أول صف وأول سعر
  selectRow(0);
}

// اختيار صف معيّن
function selectRow(idx) {
  const rows = document.querySelectorAll('#resultTable tbody tr');
  rows.forEach(r => r.classList.remove('selected'));

  if (idx < 0 || idx >= rows.length) return;
  rows[idx].classList.add('selected');
  currentIndex = idx;

  const priceCell = rows[idx].querySelector('td:last-child');
  if (priceCell) {
    priceCell.focus();
    selectCellText(priceCell);
  }
}

// دالة لتحديد النص بالكامل داخل خلية السعر
function selectCellText(cell) {
  const range = document.createRange();
  range.selectNodeContents(cell);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// Enter للانتقال على الصف التالي مع تحديد السعر بالكامل
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const rows = document.querySelectorAll('#resultTable tbody tr');
    if (rows.length === 0) return;
    e.preventDefault();
    const nextIndex = (currentIndex + 1) % rows.length;
    selectRow(nextIndex);
  }
});

// زر تصدير PDF
document.getElementById('exportPdfBtn').addEventListener('click', function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'pt', 'a4');

  const table = document.getElementById('resultTable');

  html2canvas(table).then(canvas => {
    const imgData = canvas.toDataURL('image PNG');
    const imgWidth = 550;
    const pageWidth = doc.internal.pageSize.getWidth();
    const x = (pageWidth - imgWidth) / 2;
    doc.addImage(imgData, 'PNG', x, 40, imgWidth, 0);
    doc.save('pricing.pdf');
  });
});
</script>

</body>
</html>
