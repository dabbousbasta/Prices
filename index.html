<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>فواتير للتسعير لدبوس البسطة</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f7f7f7; }
    fieldset { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; background: #fff; }
    select, button, input { padding: 8px 10px; margin: 5px; }

    /* اتجاه الجدول من اليسار إلى اليمين */
    #dataTable { direction: ltr; }

    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; }
    th { background-color: #007cba; color: white; }
    .total-row td { font-weight: bold; background-color: #f0f0f0; }
    .invoice-total { background-color: #e8f4fd; padding: 15px; margin-bottom: 15px; border-radius: 5px; font-weight: bold; font-size: 18px; }
    .invoice-total span { color: #007cba; font-size: 22px; }
    #btnShare { background-color: #25D366; color: white; border: none; font-weight: bold; }
    #btnShare:hover { background-color: #128C7E; }

    /* عمود Item: نص من اليسار إلى اليمين */
    .col-item { text-align: left; direction: ltr; }

    /* الأعمدة الأخرى: نص من اليمين إلى اليسار */
    .col-qty,
    .col-cost,
    .col-total {
      text-align: right;
      direction: rtl;
    }

    /* تنسيق الأعمدة على الديسكتوب */
    .col-item { width: 50%; }
    .col-qty { width: 15%; }
    .col-cost { width: 20%; }
    .col-total { width: 15%; }

    /* تنسيق خاص للموبايل: إلغاء عمود Total وضبط العرض */
    @media (max-width: 768px) {
      /* إخفاء عمود Total بالكامل */
      #dataTable .col-total,
      #dataTable thead th:nth-child(4),
      #dataTable tfoot td:nth-child(4) {
        display: none !important;
      }

      /* ضبط عرض Qty لـ 4 أرقام */
      #dataTable .col-qty {
        width: 15%;
        min-width: 50px;
        max-width: 70px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ضبط عرض Cost ليظهر 0000.00 فقط */
      #dataTable .col-cost {
        width: 20%;
        min-width: 70px;
        max-width: 90px;
        overflow: hidden;
      }

      /* حقل السعر بدون أسهم وصغير بعرض العمود */
      #dataTable .col-cost input[type="number"] {
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        padding: 4px 2px;
        font-size: 14px;
        -moz-appearance: textfield; /* Firefox */
      }
      #dataTable .col-cost input[type="number"]::-webkit-outer-spin-button,
      #dataTable .col-cost input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* باقي العرض لعمود Item */
      #dataTable .col-item {
        width: auto;
      }

      /* خلية الـ total في الـ tfoot */
      #dataTable #totalAmount {
        display: none !important;
      }

      /* تسميات الـ tfoot */
      #dataTable tfoot td:nth-child(1),
      #dataTable tfoot td:nth-child(2),
      #dataTable tfoot td:nth-child(3) {
        text-align: center;
        font-size: 12px;
      }

      /* دمج الـ total في خانة Cost على الموبايل */
      #dataTable tfoot td:nth-child(3) {
        text-align: left !important;
      }
    }
  </style>
</head>
<body>
  <h1>فواتير للتسعير لدبوس البسطة</h1>

  <div class="invoice-total">
    مجموع الفاتورة: <span id="invoiceTotal">0.00</span> $
  </div>

  <fieldset>
    <legend>اختر</legend>
    <label>الملف:</label>
    <select id="selectFile">
      <option value="">اختر ملف...</option>
    </select>
    <button id="btnShare">مشاركة PDF</button>
  </fieldset>

  <div id="tableContainer">
    <table id="dataTable">
      <thead>
        <tr>
          <th class="col-item">Item</th>
          <th class="col-qty">Qty</th>
          <th class="col-cost">Cost ($)</th>
          <th class="col-total">Total</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
      <tfoot id="tableFoot">
        <tr class="total-row">
          <td class="col-item">Item</td>
          <td class="col-qty">Qty</td>
          <td class="col-cost">Cost ($)</td>
          <td class="col-total" id="totalAmount">0.00</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <script>
    const FILES_LIST_URL = "invoices/files.json";
    const INVOICES_FOLDER = "invoices/";
    let currentFileName = "";

    async function loadFileList() {
      try {
        const response = await fetch(FILES_LIST_URL);
        const fileList = await response.json();
        return fileList;
      } catch (e) {
        alert("خطأ في قراءة ملف invoices/files.json:\n" + e.message);
        console.error(e);
        return [];
      }
    }

    async function loadWorkbook(fileName) {
      try {
        const encodedFileName = encodeURIComponent(fileName);
        const response = await fetch(INVOICES_FOLDER + encodedFileName);
        const data = await response.arrayBuffer();
        return XLSX.read(data, { type: "array", cellFormula: false, cellDates: true });
      } catch (e) {
        alert("خطأ في قراءة الملف " + fileName + ":\n" + e.message);
        console.error(e);
        return null;
      }
    }

    function getInvoiceData(workbook) {
      const sheetName = workbook.SheetNames[0];
      const ws = workbook.Sheets[sheetName];
      
      const data = XLSX.utils.sheet_to_json(ws, { 
        header: 1, 
        defval: "", 
        blankrows: false,
        raw: false,
        formatted: true
      });

      const rows = [];

      for (let i = 1; i < data.length; i++) {
        const row = data[i];
        
        const itemname = row[4];   // Column E - Item_Name
        const qty = row[6];        // Column G - QTY
        const note = row[30];      // Column AE - Note
        const cost = row[33];      // Column AH - COST

        // تجاهل الصفوف الفارغة تماماً
        if (!itemname && !qty && !note && !cost) {
          continue;
        }
        
        // إذا itemname فارغ، تجاهل
        if (!itemname || String(itemname).trim() === "") {
          continue;
        }
        
        let itemnameStr = String(itemname).trim();
        let noteStr = "";
        if (note && String(note).trim() !== "" && String(note) !== "undefined" && String(note) !== "null") {
          noteStr = String(note).trim();
        }

        const costValue = (cost === "" || cost === null || cost === undefined) ? 0 : parseFloat(cost) || 0;
        const qtyValue = parseFloat(qty) || 0;

        rows.push({
          itemname: itemnameStr,
          note: noteStr,
          qty: qtyValue,
          cost: costValue
        });
      }

      return rows;
    }

    function calculateRowTotal(qty, cost) {
      return qty * cost;
    }

    function renderTable(rows) {
      const tbody = document.getElementById("tableBody");
      const totalTd = document.getElementById("totalAmount");
      const invoiceTotal = document.getElementById("invoiceTotal");

      tbody.innerHTML = "";

      if (rows.length === 0) {
        const tr = document.createElement("tr");
        tr.innerHTML = '<td colspan="4">No data in file.</td>';
        tbody.appendChild(tr);
        totalTd.textContent = "0.00";
        invoiceTotal.textContent = "0.00";
        return;
      }

      let total = 0;
      rows.forEach((row, index) => {
        const rowTotal = calculateRowTotal(row.qty, row.cost);
        total += rowTotal;

        // سطران في خانة الـ Item: الأول itemname، الثاني note
        const itemCell = row.note
          ? `${row.itemname}<br>${row.note}`
          : row.itemname;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="col-item" style="height: 50px; vertical-align: middle; line-height: 1.4;">${itemCell}</td>
          <td class="col-qty">${row.qty}</td>
          <td class="col-cost"><input type="number" id="price-${index}" value="${row.cost.toFixed(2)}" step="0.01" min="0" onfocus="this.select()" oninput="updateRowTotal(${index}, ${row.qty})" /></td>
          <td class="col-total" id="row-total-${index}">${rowTotal.toFixed(2)}</td>
        `;
        tbody.appendChild(tr);

        const priceInput = tr.querySelector(`#price-${index}`);
        priceInput.addEventListener("keydown", function(e) {
          if (e.key === "Enter") {
            e.preventDefault();
            const nextIndex = index + 1;
            const nextInput = document.getElementById(`price-${nextIndex}`);
            if (nextInput) {
              nextInput.focus();
            }
          }
        });
      });

      totalTd.textContent = total.toFixed(2);
      invoiceTotal.textContent = total.toFixed(2);
    }

    function updateRowTotal(index, qty) {
      const priceInput = document.getElementById(`price-${index}`);
      const newCost = parseFloat(priceInput.value) || 0;
      const rowTotal = calculateRowTotal(qty, newCost);
      document.getElementById(`row-total-${index}`).textContent = rowTotal.toFixed(2);
      updateInvoiceTotal();
    }

    function updateInvoiceTotal() {
      let total = 0;
      const rowTotals = document.querySelectorAll("#tableBody tr");
      rowTotals.forEach((tr, index) => {
        const rowTotalCell = document.getElementById(`row-total-${index}`);
        if (rowTotalCell) {
          total += parseFloat(rowTotalCell.textContent) || 0;
        }
      });
      document.getElementById("totalAmount").textContent = total.toFixed(2);
      document.getElementById("invoiceTotal").textContent = total.toFixed(2);
    }

    function shareAsPDF() {
      const element = document.body;
      const pdfFileName = currentFileName.replace(/\.xlsx$/, '.pdf').replace(/\.xlsm$/, '.pdf');
      const opt = {
        margin: 10,
        filename: pdfFileName,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jshtml: false
      };
      html2pdf().set(opt).from(element).save();
    }

    async function refreshPage() {
      const fileList = await loadFileList();
      const selectFile = document.getElementById("selectFile");
      
      selectFile.innerHTML = '<option value="">اختر ملف...</option>';
      fileList.forEach(fileName => {
        const opt = document.createElement("option");
        opt.value = fileName;
        opt.textContent = fileName;
        selectFile.appendChild(opt);
      });

      // عند تغيير الاختيار، حمّل الجدول تلقائياً
      selectFile.addEventListener("change", () => {
        const selectedFile = selectFile.value;
        if (!selectedFile) {
          // لا تفعل شيئاً إذا لم يتم اختيار ملف
          return;
        }
        currentFileName = selectedFile;
        loadWorkbook(selectedFile).then(workbook => {
          if (!workbook) return;
          const rows = getInvoiceData(workbook);
          renderTable(rows);
        });
      });

      document.getElementById("btnShare").onclick = shareAsPDF;
    }

    window.addEventListener("load", refreshPage);
  </script>
</body>
</html>
