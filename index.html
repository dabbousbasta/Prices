<script>
let allRows = [];
let currentIndex = 0;
let headerInfo = {
  account: "",
  statement: "",
  refNo: ""
};

// قراءة ملف الإكسل أوتوماتيك عند فتح الصفحة
window.addEventListener('load', function() {
  fetch('invoice.xlsx')
    .then(response => {
      if (!response.ok) throw new Error('لم يتم العثور على invoice.xlsx');
      return response.arrayBuffer();
    })
    .then(data => {
      const workbook = XLSX.read(data, { type: 'array' });

      allRows = [];
      headerInfo = { account: "", statement: "", refNo: "" };

      workbook.SheetNames.forEach(sheetName => {
        const worksheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

        // قراءة الهيدر (Ref. No / الحساب / البيان)
        extractHeaderInfo(json);

        // قراءة الأصناف Description / Qty / U.Price
        let headerRowIndex = -1;
        for (let i = 0; i < json.length; i++) {
          const row = json[i].map(x => (x || "").toString().trim());
          if (row.includes("Description") && row.includes("Qty") && row.includes("U.Price")) {
            headerRowIndex = i;
            break;
          }
        }

        if (headerRowIndex === -1) return;

        const headers = json[headerRowIndex];
        const descIndex  = headers.indexOf("Description");
        const qtyIndex   = headers.indexOf("Qty");
        const priceIndex = headers.indexOf("U.Price");

        for (let r = headerRowIndex + 1; r < json.length; r++) {
          const row = json[r];
          if (!row || row.length === 0) continue;

          const desc  = (row[descIndex]  || "").toString().trim();
          const qty   = (row[qtyIndex]   || "").toString().trim();
          const price = (row[priceIndex] || "").toString().trim();

          if (desc === "" && qty === "" && price === "") continue;

          allRows.push({
            description: desc,
            qty: qty,
            price: price
          });
        }
      });

      updateHeaderDiv();
      renderTable();
    })
    .catch(err => {
      alert('خطأ في قراءة الملف: ' + err.message);
    });
});

// استخراج رقم الفاتورة / اسم الحساب / البيان من صفوف الشيت
function extractHeaderInfo(json) {
  for (let i = 0; i < json.length; i++) {
    const row = json[i].map(x => (x || "").toString().trim());

    // البحث عن Ref. No.:
    const refCell = row.find(c => c.includes("Ref. No.:"));
    if (refCell) {
      // مثال: "Acc. No. : 413162 ,,, Ref. No.: SA1 - 106 ,,,"
      const parts = refCell.split("Ref. No.:");
      if (parts.length > 1) {
        headerInfo.refNo = parts[1].trim();
      }

      // الصف اللي بعده: اسم الحساب (أول خلية غير فاضية)
      if (i + 1 < json.length && !headerInfo.account) {
        const accRow = json[i + 1].map(x => (x || "").toString().trim());
        const nonEmpty = accRow.find(c => c !== "");
        if (nonEmpty) headerInfo.account = nonEmpty;
      }

      // الصف اللي بعده: البيان (أول خلية غير فاضية)
      if (i + 2 < json.length && !headerInfo.statement) {
        const stRow = json[i + 2].map(x => (x || "").toString().trim());
        const nonEmptySt = stRow.find(c => c !== "");
        if (nonEmptySt) headerInfo.statement = nonEmptySt;
      }

      break; // يكفي أول مرة نلاقي فيها Ref. No
    }
  }
}

// تحديث النص المعروض فوق الجدول
function updateHeaderDiv() {
  const div = document.getElementById('headerInfo');
  div.innerHTML = `
    <div>اسم الحساب: ${headerInfo.account || "-"}</div>
    <div>البيان: ${headerInfo.statement || "-"}</div>
    <div>رقم الفاتورة: ${headerInfo.refNo || "-"}</div>
  `;
}

// رسم الجدول
function renderTable() {
  const tbody = document.querySelector('#resultTable tbody');
  tbody.innerHTML = "";

  allRows.forEach((r, i) => {
    const tr = document.createElement('tr');
    if (i === 0) tr.classList.add('selected');
    tr.dataset.index = i;

    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${r.description}</td>
      <td>${r.qty}</td>
      <td contenteditable="true">${r.price}</td>
    `;

    tr.addEventListener('click', function() {
      selectRow(parseInt(this.dataset.index, 10));
    });

    const priceCell = tr.querySelector('td:last-child');
    priceCell.addEventListener('focus', function() {
      selectRow(i);
      selectCellText(this);
    });

    tbody.appendChild(tr);
  });

  currentIndex = 0;
  selectRow(0);
}

// اختيار صف
function selectRow(idx) {
  const rows = document.querySelectorAll('#resultTable tbody tr');
  rows.forEach(r => r.classList.remove('selected'));

  if (idx < 0 || idx >= rows.length) return;
  rows[idx].classList.add('selected');
  currentIndex = idx;

  const priceCell = rows[idx].querySelector('td:last-child');
  if (priceCell) {
    priceCell.focus();
    selectCellText(priceCell);
  }
}

// تحديد كامل نص خلية السعر
function selectCellText(cell) {
  const range = document.createRange();
  range.selectNodeContents(cell);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// Enter للانتقال على الصف التالي مع تحديد السعر
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const rows = document.querySelectorAll('#resultTable tbody tr');
    if (rows.length === 0) return;
    e.preventDefault();
    const nextIndex = (currentIndex + 1) % rows.length;
    selectRow(nextIndex);
  }
});

// زر تصدير PDF (الهيدر + الجدول)
document.getElementById('exportPdfBtn').addEventListener('click', function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'pt', 'a4');

  const container = document.createElement('div');
  const headerClone = document.getElementById('headerInfo').cloneNode(true);
  const tableClone = document.getElementById('resultTable').cloneNode(true);

  container.style.padding = '10px';
  container.appendChild(headerClone);
  container.appendChild(document.createElement('br'));
  container.appendChild(tableClone);

  document.body.appendChild(container);

  html2canvas(container).then(canvas => {
    const imgData = canvas.toDataURL('image/png');
    const pageWidth = doc.internal.pageSize.getWidth();
    const imgWidth = pageWidth - 40;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    doc.addImage(imgData, 'PNG', 20, 20, imgWidth, imgHeight);
    document.body.removeChild(container);
    doc.save('pricing.pdf');
  });
});
</script>
