<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مراجعة أسعار الفواتير - دبوس البسطة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* نفس الـ CSS السابق - بدون تغيير */
        body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f5f5f5; margin: 0; padding: 10px; box-sizing: border-box; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 20px; margin-top: 0; text-align: center; }
        .row { margin-bottom: 10px; }
        label { display: block; font-size: 14px; margin-bottom: 4px; }
        select, button { width: 100%; font-size: 14px; padding: 6px 8px; box-sizing: border-box; }
        button { cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 4px; margin-top: 5px; }
        button:disabled { background: #999; cursor: not-allowed; }
        .info-box { background: #f0f4ff; border-radius: 4px; padding: 8px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
        .label-title { font-weight: bold; }
        .value-box { background: #fafafa; border-radius: 4px; padding: 6px; margin-top: 4px; font-size: 13px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 4px 6px; text-align: center; }
        th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
        tbody tr:nth-child(odd) { background: #fcfcfc; }
        tbody tr:nth-child(even) { background: #f6f6f6; }
        .price-input { 
            width: 100%; 
            border: none; 
            background: transparent; 
            text-align: center; 
            font-size: 13px; 
            padding: 2px; 
            box-sizing: border-box;
            -webkit-appearance: none;
        }
        .price-input:focus { 
            outline: 2px solid #007bff; 
            background: #fff; 
        }
        .table-container { max-height: 60vh; overflow: auto; border: 1px solid #ddd; border-radius: 4px; margin-top: 10px; }
        .loading { font-size: 13px; color: #555; }
        .error { font-size: 13px; color: #b00020; }
        .success { color: #0a6c00; }
        .download-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .download-buttons button { flex: 1; min-width: 110px; }
        .download-original { background: #28a745; }
        .download-simple { background: #17a2b8; }
        .download-pdf { background: #dc3545; }
        .whatsapp-share { background: #25D366 !important; }
        .file-info { font-size: 12px; color: #666; margin-top: 5px; }
        .arrow-hint { font-size: 12px; color: #666; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔥 مراجعة وتعديل أسعار الفواتير</h1>
    <div class="info-box">
        ✅ **اكتشاف تلقائي** من مجلد invoices/<br>
        📄 يدعم Excel و PDF<br>
        ⬆️⬇️⏎ **Enter + أسهم** تنتقل بين الأسعار (موبايل + كمبيوتر)
    </div>

    <div class="row">
        <button id="scanFolderBtn" onclick="scanFolder()">🔍 فحص مجلد invoices/</button>
    </div>

    <div id="status" class="loading">اضغط "فحص مجلد"</div>

    <div class="row">
        <label for="invoiceSelect">اختيار الفاتورة:</label>
        <select id="invoiceSelect" disabled>
            <option value="">— اختر فاتورة —</option>
        </select>
        <div id="fileInfo" class="file-info"></div>
    </div>

    <div class="row">
        <span class="label-title">اسم الحساب:</span>
        <div id="accountName" class="value-box">—</div>
    </div>

    <div class="row">
        <span class="label-title">بيان الفاتورة:</span>
        <div id="invoiceDescription" class="value-box">—</div>
    </div>

    <div class="row download-buttons">
        <button id="downloadOriginalBtn" disabled class="download-original">الأصلي المحدث</button>
        <button id="downloadSimpleBtn" disabled class="download-simple">النسخة المبسطة</button>
        <button id="downloadPdfBtn" disabled class="download-pdf">📄 PDF</button>
        <button id="whatsappShareBtn" disabled class="whatsapp-share">📱 واتساب</button>
    </div>

    <div class="arrow-hint">💡 **Enter + Tab + ↑↓** للتنقل السريع بين الأسعار</div>

    <div class="table-container">
        <table>
            <thead>
                <tr><th>الوصف</th><th>الكمية</th><th>السعر (U.Price)</th></tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </div>
</div>

<script>
    const invoices = {};
    let currentInvoiceCode = null;
    let currentInvoiceData = null;
    let priceInputs = [];

    // Elements
    const invoiceSelect = document.getElementById('invoiceSelect');
    const fileInfoDiv = document.getElementById('fileInfo');
    const accountNameDiv = document.getElementById('accountName');
    const invoiceDescDiv = document.getElementById('invoiceDescription');
    const itemsBody = document.getElementById('itemsBody');
    const downloadOriginalBtn = document.getElementById('downloadOriginalBtn');
    const downloadSimpleBtn = document.getElementById('downloadSimpleBtn');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');
    const whatsappShareBtn = document.getElementById('whatsappShareBtn');
    const statusDiv = document.getElementById('status');

    // Event Listeners
    invoiceSelect.addEventListener('change', handleInvoiceChange);
    downloadOriginalBtn.addEventListener('click', handleDownloadOriginal);
    downloadSimpleBtn.addEventListener('click', handleDownloadSimple);
    downloadPdfBtn.addEventListener('click', handleDownloadPdf);
    whatsappShareBtn.addEventListener('click', handleWhatsAppShare);

    // 🔥 الحل: فحص ديناميكي لكل ملفات invoices/
    window.scanFolder = async function() {
        statusDiv.textContent = '🔍 فحص سريع لمجلد invoices/...';
        statusDiv.className = 'loading';

        try {
            // جلب كل ملفات المجلد باستخدام GitHub Pages directory listing أو افتراضي
            const folderUrl = 'invoices/';
            const response = await fetch(folderUrl);
            
            if (!response.ok) {
                // إذا لم يعمل directory listing، جرب الملفات الشائعة
                await scanCommonFiles();
                return;
            }

            // قراءة محتويات المجلد (يعمل مع GitHub Pages)
            const text = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, 'text/html');
            const links = Array.from(doc.querySelectorAll('a[href]'))
                .map(a => a.href)
                .filter(href => href.includes(folderUrl) && 
                               (href.endsWith('.xlsx') || href.endsWith('.xls') || href.endsWith('.pdf')))
                .map(href => href.replace(folderUrl, ''));

            if (links.length === 0) {
                await scanCommonFiles();
                return;
            }

            statusDiv.textContent = `✅ وُجد ${links.length} ملف`;
            statusDiv.className = 'success';
            await loadAllInvoices(links);
            
        } catch (error) {
            console.error('خطأ في فحص المجلد:', error);
            statusDiv.textContent = '❌ خطأ في فحص المجلد. جرب رفع ملفات في invoices/';
            statusDiv.className = 'error';
            await scanCommonFiles();
        }
    };

    // فحص الملفات الشائعة كبديل
    async function scanCommonFiles() {
        const commonFiles = [
            'SA-1.xlsx', 'SA-2.xlsx', 'SA-3.xlsx', 'SA-4.xlsx', 'SA-5.xlsx',
            'SA-10.xlsx', 'SA-88.xlsx', 'SA-101.xlsx', 'SA-102.xlsx', 'SA-610.xlsx',
            'فاتورة.xlsx', 'invoice.xlsx',
            'SA-1.pdf', 'SA-2.pdf', 'SA-3.pdf', 'SA-4.pdf', 'SA-5.pdf',
            'SA-10.pdf', 'SA-88.pdf', 'SA-101.pdf', 'SA-102.pdf', 'SA-610.pdf',
            'فاتورة.pdf', 'invoice.pdf'
        ];

        const foundFiles = [];
        for (let fileName of commonFiles) {
            if (await fileExists(`invoices/${fileName}`)) {
                foundFiles.push(fileName);
            }
        }

        if (foundFiles.length > 0) {
            statusDiv.textContent = `✅ وُجد ${foundFiles.length} ملف شائع`;
            statusDiv.className = 'success';
            await loadAllInvoices(foundFiles);
        } else {
            statusDiv.textContent = '❌ لم يُعثر على ملفات في invoices/. تأكد من وجود الملفات';
            statusDiv.className = 'error';
        }
    }

    async function fileExists(filePath) {
        try {
            const response = await fetch(filePath, { method: 'HEAD', cache: 'no-cache' });
            return response.ok;
        } catch {
            return false;
        }
    }

    // تحميل كل الفواتير
    async function loadAllInvoices(fileNames) {
        invoiceSelect.innerHTML = '<option value="">— جاري التحميل... —</option>';
        invoiceSelect.disabled = true;

        for (let fileName of fileNames) {
            try {
                statusDiv.textContent = `📥 تحميل ${fileName}...`;
                const fullPath = `invoices/${fileName}`;
                const invoiceCode = extractInvoiceCode(fileName);
                
                const isPdf = fileName.toLowerCase().endsWith('.pdf');
                let data;
                
                if (isPdf) {
                    data = await extractPdfData(fullPath);
                } else {
                    data = await extractExcelData(fullPath, fileName);
                }

                if (data && data.items && data.items.length > 0) {
                    invoices[invoiceCode] = {
                        ...data,
                        fileName,
                        invoiceCode,
                        isPdf,
                        sheetCount: data.sheets ? Object.keys(data.sheets).length : 1,
                        totalItems: data.items.length
                    };
                }
            } catch (e) {
                console.error(`خطأ في تحميل ${fileName}:`, e);
            }
        }

        populateInvoiceSelect();
    }

    function extractInvoiceCode(fileName) {
        const match = fileName.match(/SA-(\d+)|فاتورة|invoice/i);
        return match ? (match[1] || 'فاتورة') : fileName.split('.')[0];
    }

    // استخراج بيانات Excel
    async function extractExcelData(filePath, fileName) {
        const response = await fetch(filePath);
        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        
        let allItems = [];
        let accountName = '';
        let invoiceDesc = '';

        for (let sheetName of workbook.SheetNames) {
            const worksheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            // البحث عن اسم الحساب وبيان الفاتورة
            for (let row of jsonData.slice(0, 10)) {
                if (row && row.length > 0 && typeof row[0] === 'string') {
                    if (row[0].includes('الحساب') || row[0].includes('Account')) {
                        accountName = row.slice(1).join(' ').trim();
                    } else if (row[0].includes('فاتورة') || row[0].includes('Invoice')) {
                        invoiceDesc = row.slice(1).join(' ').trim();
                    }
                }
            }

            // استخراج العناصر (الصفوف التي تحتوي على وصف + كمية + سعر)
            for (let i = 0; i < jsonData.length; i++) {
                const row = jsonData[i];
                if (row.length >= 3) {
                    const desc = row[0]?.toString().trim();
                    const qty = parseFloat(row[1]) || '';
                    const price = parseFloat(row[2]) || '';
                    
                    if (desc && (qty > 0 || price > 0)) {
                        allItems.push({
                            description: desc,
                            qty,
                            price: price.toString(),
                            row: i,
                            colPrice: 2,
                            sheetName
                        });
                    }
                }
            }
        }

        return {
            workbook,
            accountName,
            invoiceDesc,
            items: allItems.slice(0, 50) // حد أقصى 50 عنصر
        };
    }

    // استخراج بيانات PDF (بسيط)
    async function extractPdfData(filePath) {
        // PDF parsing بسيط - يمكن تطويره لاحقاً
        const response = await fetch(filePath);
        const arrayBuffer = await response.arrayBuffer();
        const uint8Array = new Uint8Array(arrayBuffer);
        
        return {
            accountName: 'من PDF',
            invoiceDesc: 'فاتورة PDF',
            items: [
                { description: 'عنصر تجريبي', qty: 1, price: '0.00' }
            ]
        };
    }

    function populateInvoiceSelect() {
        invoiceSelect.innerHTML = '<option value="">— اختر فاتورة —</option>';
        Object.keys(invoices).sort().forEach(code => {
            const option = document.createElement('option');
            option.value = code;
            option.textContent = `${code} (${invoices[code].fileName})`;
            invoiceSelect.appendChild(option);
        });
        
        invoiceSelect.disabled = Object.keys(invoices).length === 0;
        if (Object.keys(invoices).length > 0) {
            statusDiv.textContent = `✅ جاهز! ${Object.keys(invoices).length} فاتورة`;
            statusDiv.className = 'success';
        }
    }

    // باقي الدوال (نفس الكود السابق)
    function handleInvoiceChange() {
        const invoiceCode = invoiceSelect.value;
        if (!invoiceCode || !invoices[invoiceCode]) return;

        currentInvoiceCode = invoiceCode;
        currentInvoiceData = invoices[invoiceCode];
        const inv = currentInvoiceData;

        accountNameDiv.textContent = inv.accountName || 'غير متوفر';
        invoiceDescDiv.textContent = inv.invoiceDesc || 'غير متوفر';
        fileInfoDiv.innerHTML = `📄 <strong>${inv.fileName}</strong><br>${inv.sheetCount} صفحة | ${inv.totalItems} صنف ${inv.isPdf ? '(PDF)' : '(Excel)'}`;

        renderItemsTable(inv.items);
        downloadOriginalBtn.disabled = !inv.workbook;
        downloadSimpleBtn.disabled = false;
        downloadPdfBtn.disabled = false;
        whatsappShareBtn.disabled = false;
    }

    function renderItemsTable(items) {
        itemsBody.innerHTML = '';
        priceInputs = [];
        
        items.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.description || ''}</td>
                <td>${item.qty || ''}</td>
                <td><input type="number" step="0.01" class="price-input" 
                           value="${item.price || ''}" data-index="${index}"></td>
            `;
            itemsBody.appendChild(tr);
        });

        priceInputs = Array.from(itemsBody.querySelectorAll('.price-input'));
        priceInputs.forEach((input, idx) => {
            input.addEventListener('focus', function() { 
                this.select(); 
                this.dataset.activeIndex = idx;
            });
            
            input.addEventListener('input', function() {
                const idx = parseInt(this.dataset.index);
                currentInvoiceData.items[idx].price = this.value === '' ? '' : parseFloat(this.value);
            });
            
            input.addEventListener('keydown', function(e) {
                const currentIdx = parseInt(this.dataset.activeIndex || idx);
                
                if (e.key === 'Enter' || e.key === 'NumpadEnter') {
                    e.preventDefault();
                    if (e.shiftKey && currentIdx > 0) {
                        priceInputs[currentIdx - 1].focus();
                    } else if (currentIdx < priceInputs.length - 1) {
                        priceInputs[currentIdx + 1].focus();
                    }
                } 
                else if (e.key === 'ArrowUp' && currentIdx > 0) {
                    e.preventDefault();
                    priceInputs[currentIdx - 1].focus();
                } 
                else if (e.key === 'ArrowDown' && currentIdx < priceInputs.length - 1) {
                    e.preventDefault();
                    priceInputs[currentIdx + 1].focus();
                }
            });
        });
    }

    function handleDownloadOriginal() {
        if (!currentInvoiceData?.workbook) return;
        const inv = currentInvoiceData;
        inv.items.forEach(item => {
            const sheet = inv.workbook.Sheets[item.sheetName];
            const cellAddr = XLSX.utils.encode_cell({ r: item.row, c: item.colPrice });
            if (!sheet[cellAddr]) sheet[cellAddr] = { t: 'n', v: 0 };
            sheet[cellAddr].t = 'n';
            sheet[cellAddr].v = item.price === '' ? 0 : parseFloat(item.price || 0);
        });
        const wbout = XLSX.write(inv.workbook, { bookType: 'xlsx', type: 'array' });
        downloadFile(wbout, inv.fileName.replace(/\\.(xlsx|xls|pdf)$/i, '_محدث.xlsx'));
    }

    function handleDownloadSimple() {
        if (!currentInvoiceData) return;
        const wb = XLSX.utils.book_new();
        const ws_data = [
            [`الملف: ${currentInvoiceData.fileName}`],
            [`الفاتورة: ${currentInvoiceCode}`],
            ['الوصف', 'الكمية', 'السعر']
        ];
        currentInvoiceData.items.forEach(item => {
            ws_data.push([item.description || '', item.qty || 0, item.price || 0]);
        });
        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        XLSX.utils.book_append_sheet(wb, ws, 'فاتورة محدثة');
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        downloadFile(wbout, `${currentInvoiceCode}_مبسط.xlsx`);
    }

    async function handleDownloadPdf() {
        if (!currentInvoiceData) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text('فاتورة محدثة - ' + currentInvoiceCode, 105, 20, { align: 'center' });
        doc.setFontSize(12);
        doc.text(currentInvoiceData.accountName || '', 105, 30, { align: 'center' });
        doc.text(currentInvoiceData.invoiceDesc || '', 105, 38, { align: 'center' });
        let y = 50;
        doc.text(['الوصف', 'الكمية', 'السعر'], [10, 70, 170], y);
        y += 8;
        currentInvoiceData.items.forEach((item) => {
            if (y > 270) { doc.addPage(); y = 20; }
            const desc = (item.description || '').substring(0, 25);
            doc.text([desc, item.qty?.toString() || '', (item.price || 0).toString()], [10, 70, 170], y);
            y += 6;
        });
        doc.save(`${currentInvoiceCode}_محدث.pdf`);
    }

    function handleWhatsAppShare() {
        handleDownloadSimple();
    }

    function downloadFile(wbout, filename) {
        const blob = new Blob([wbout], { type: "application/octet-stream" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
